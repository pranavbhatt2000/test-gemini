name: Sync AI Agent Docs from AGENTS.md

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

# Prevent multiple runs from racing on the same PR. If a new commit lands
# while this workflow is mid-run, cancel the in-progress run — the new one
# will regenerate everything from scratch anyway.
concurrency:
  group: agents-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    # When this workflow pushes its bot commit, the PR receives a
    # `synchronize` event. [skip ci] only suppresses push-triggered
    # workflows — pull_request-triggered workflows (including this one
    # and every other CI workflow in the repo) would re-run. Checking
    # `sender.login` lets us bail out immediately on the bot-authored
    # synchronize event so we don't loop and don't cause other CI
    # workflows to restart a second time.
    if: github.event.sender.login != 'github-actions[bot]'

    steps:
      # ── Checkout: sparse + shallow ──
      # Only check out **/AGENTS.md files. Combined with depth 1, this
      # turns a multi-GB monorepo clone into a few-KB operation.
      # Writing new files (styleguide, instructions) outside the sparse
      # cone works fine — git add --sparse handles it.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
          sparse-checkout: |
            **/AGENTS.md
          sparse-checkout-cone-mode: false

      # ── Get changed files from GitHub API ──
      # Replaces `git diff BASE HEAD` which required fetch-depth: 0.
      # The API already knows the diff — no need to download commit history.
      - name: Get changed files from GitHub API
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const files = [];
            for await (const response of github.paginate.iterator(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              }
            )) {
              for (const file of response.data) {
                files.push(file.filename);
              }
            }
            core.setOutput('files', files.join('\n'));

      - name: Check for AGENTS.md changes
        id: detect
        shell: bash
        run: |
          CHANGED_FILES="${{ steps.changed.outputs.files }}"
          if echo "$CHANGED_FILES" | grep -q 'AGENTS\.md$'; then
            echo "agents_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "agents_changed=false" >> "$GITHUB_OUTPUT"
          fi

      # ══════════════════════════════════════════════════════════════════
      # AGENTS.MD CHANGE WARNING — only when AGENTS.md files changed
      # Posts (or updates) a single PR comment warning that Gemini Code
      # Assist reads styleguide.md from the default branch, so review
      # rule changes won't take effect until this PR is merged.
      # ══════════════════════════════════════════════════════════════════

      - name: Post or update AGENTS.md change warning
        if: steps.detect.outputs.agents_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = `${{ steps.changed.outputs.files }}`;
            const agentsFiles = changedFiles
              .split('\n')
              .filter(f => f.endsWith('AGENTS.md'))
              .map(f => `\`${f}\``)
              .join(', ');

            const MARKER = '<!-- agents-md-change-warning -->';
            const body = [
              MARKER,
              '## ⚠️ AGENTS.md Change Detected',
              '',
              `This PR modifies the following agent instruction files: ${agentsFiles}`,
              '',
              '**Important:** Gemini Code Assist reads `.gemini/styleguide.md` from the',
              '**default branch (main)**, not from the PR branch. This means:',
              '',
              '- The updated review rules in this PR **will NOT be used** by Gemini Code',
              '  Assist until this PR is merged.',
              '- Please rely on **human code review** or other AI agents (Claude, Copilot)',
              '  to verify the AGENTS.md changes in this PR.',
              '- After merge, all subsequent PRs will be reviewed under the new rules.',
              '',
              `_Auto-generated by [${context.workflow}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing warning comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new warning comment');
            }

      # ══════════════════════════════════════════════════════════════════
      # FILE GENERATION — only when AGENTS.md files changed
      # Generates .gemini/styleguide.md and .github/instructions/*.md,
      # then pushes a single commit with all changes.
      # ══════════════════════════════════════════════════════════════════

      # ── Gemini: generate .gemini/styleguide.md with mapping table ──

      - name: Generate .gemini/styleguide.md
        if: steps.detect.outputs.agents_changed == 'true'
        shell: python3 {0}
        run: |
          import pathlib, textwrap

          # ── Discover all AGENTS.md files and build the mapping ──
          agents_files = sorted(
              pathlib.Path('.').rglob('AGENTS.md'),
              key=lambda p: -len(p.parts)  # deepest first
          )
          # Filter out .git directory
          agents_files = [p for p in agents_files if '.git' not in p.parts]

          # Build mapping rows: deepest path first, root last
          rows = []
          for path in agents_files:
              parent = path.parent
              if parent == pathlib.Path('.'):
                  rows.append(('`**`', '`AGENTS.md`'))
              else:
                  pattern = f'`{parent}/**`'
                  rows.append((pattern, f'`{path}`'))

          # ── Build the mapping table ──
          table_lines = [
              '| Path Pattern | Governing AGENTS.md |',
              '|---|---|',
          ]
          for pattern, governing in rows:
              table_lines.append(f'| {pattern} | {governing} |')
          table = '\n'.join(table_lines)

          # ── Compose the full styleguide ──
          header = textwrap.dedent("""\
              <!--
                AUTO-GENERATED FILE — DO NOT EDIT DIRECTLY.
                Generated by .github/workflows/agents-sync.yml on every PR that
                touches any AGENTS.md file. To change the Gemini-specific review
                instructions, edit the template in that workflow.

                IMPORTANT CAVEAT: Gemini Code Assist reads this file from the
                default branch (main), NOT from the PR branch. Any changes to
                this file or to AGENTS.md files will only affect Gemini Code
                Assist reviews AFTER the PR containing those changes is merged.
                Rely on human code review to verify AGENTS.md changes in-flight.
              -->

              # Code Review Instructions

              ## Step 1 — Identify the governing AGENTS.md for each changed file

              Use the mapping table below to determine which AGENTS.md file governs
              each file you are reviewing. The table is ordered from most specific
              (deepest directory) to least specific (repository root). For each
              changed file, find the FIRST row whose Path Pattern matches — that
              row's Governing AGENTS.md contains the review rules for that file.

              """)

          footer = textwrap.dedent("""\

              ## Step 2 — Read each governing AGENTS.md before reviewing

              Before writing any review comments, read every distinct AGENTS.md file
              listed in the mapping above that governs at least one changed file.
              If multiple changed files share the same governing AGENTS.md, read it
              once. Do NOT begin reviewing code until you have read all relevant
              AGENTS.md files.

              ## Step 3 — Apply scoped rules during review

              When reviewing a changed file, apply the rules from its governing
              AGENTS.md. The root `AGENTS.md` provides baseline rules that apply to
              ALL files in addition to any subdirectory-specific rules.

              ## Step 4 — If the PR modifies any AGENTS.md file

              If any file ending in `AGENTS.md` appears in the changed files of this
              PR, you MUST leave a top-level review comment stating:

              > ℹ️ This PR modifies agent instruction files (AGENTS.md). Changes to
              > Gemini Code Assist review rules will only take effect **after this PR
              > is merged** to the default branch. Please rely on human code review
              > or other AI agents to verify the AGENTS.md changes in this PR.
              """)

          pathlib.Path('.gemini').mkdir(exist_ok=True)
          pathlib.Path('.gemini/styleguide.md').write_text(header + table + '\n' + footer)

          print("Generated .gemini/styleguide.md with mapping:")
          print(table)

      # ── Copilot: generate .github/instructions/*.instructions.md ──

      - name: Sync .github/instructions/ from AGENTS.md files
        if: steps.detect.outputs.agents_changed == 'true'
        shell: bash
        run: |
          mkdir -p .github/instructions

          # Always do a full regeneration on every PR commit so the
          # generated files exactly reflect the current state of the branch.
          # Deletions are handled by wiping the directory first.
          rm -f .github/instructions/*.instructions.md

          find . -name 'AGENTS.md' -not -path './.git/*' | while read -r file; do
            dir=$(dirname "$file")

            # Root AGENTS.md is handled by the .github/copilot-instructions.md
            # symlink — no instructions file needed for it.
            [ "$dir" = "." ] && continue

            # Strip leading ./ that find prepends (./frontend -> frontend)
            dir="${dir#./}"

            # Derive output filename from full path to avoid basename collisions.
            # e.g. services/auth -> services-auth.instructions.md
            #      legacy/auth   -> legacy-auth.instructions.md
            slug="${dir//\//-}"
            output=".github/instructions/${slug}.instructions.md"

            echo "Generating $output (applyTo: ${dir}/**)"
            {
              printf -- '---\n'
              printf 'applyTo: "%s/**"\n' "$dir"
              printf -- '---\n\n'
              cat "$file"
            } > "$output"
          done

      # ── Single commit for all generated files ──

      - name: Commit and push if changed
        if: steps.detect.outputs.agents_changed == 'true'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --sparse .gemini/styleguide.md .github/instructions/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync AI agent docs from AGENTS.md [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
